<header class="topbar">
  <a class="brand" [routerLink]="auth.isAdmin() ? '/admin/orders' : '/'">AAD Shop</a>
  <nav>
    @if ((auth.role$ | async) === 'USER') {
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Products
      </a>
      <a routerLink="/cart" routerLinkActive="active">Cart</a>
      <a routerLink="/orders" routerLinkActive="active">My Orders</a>
    }
    @if ((auth.role$ | async) === 'ADMIN') {
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Product Edit
      </a>
      <a routerLink="/admin/orders" routerLinkActive="active">Orders</a>
    }
  </nav>
  <div class="account">
    @if (auth.loggedIn$ | async) {
      @if (auth.role$ | async; as role) {
        <span class="role-pill">{{ role === 'ADMIN' ? 'Admin' : 'User' }}</span>
      }
      <button type="button" class="ghost" (click)="logout()">Logout</button>
    } @else {
      <a class="button ghost" routerLink="/login">Login</a>
    }
  </div>
</header>

<main class="page">
  <router-outlet />
</main>
